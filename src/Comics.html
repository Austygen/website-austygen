<!DOCTYPE html>
<html lang="en">
<head>
  <title>Austygen</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="formatting.css">
  <link rel="stylesheet" href="fonts.css">
  <style>
  body,h1,h2,h3,h4,h5 {font-family: "Poppins", sans-serif}
  body {font-size:16px;}
  .w3-half img{margin-bottom:-6px;margin-top:16px;opacity:0.8;cursor:pointer}
  .w3-half img:hover{opacity:1}
  </style>

</head>
<body>


<!-- Sidebar/menu -->
<nav class="w3-sidebar w3-red w3-collapse w3-top w3-large w3-padding" style="z-index:3;width:300px;font-weight:bold;" id="mySidebar"><br>
  <a href="javascript:void(0)" onclick="w3_close()" class="w3-button w3-hide-large w3-display-topleft" style="width:100%;font-size:22px">Close Menu</a>
  <div class="w3-container">
    <h3 class="w3-padding-64"><b>---------<br>Austygen<br>---------</b></h3>
  </div>
  <div class="w3-bar-block">
    <a href="../index.html" onclick="w3_close()" class="w3-bar-item w3-button w3-hover-white">Home</a>
    <a href="Comics.html" onclick="w3_close()" class="w3-bar-item w3-button w3-hover-white">Comics</a>
    <a href="AboutMe.html" onclick="w3_close()" class="w3-bar-item w3-button w3-hover-white">About Me</a>
    <a href="#designers" onclick="w3_close()" class="w3-bar-item w3-button w3-hover-white">TBD1</a>
    <a href="#packages" onclick="w3_close()" class="w3-bar-item w3-button w3-hover-white">TBD2</a>
    <a href="#contact" onclick="w3_close()" class="w3-bar-item w3-button w3-hover-white">TBD3</a>
  </div>
</nav>

<!-- Top menu on small screens -->
<header class="w3-container w3-top w3-hide-large w3-red w3-xlarge w3-padding">
  <a href="javascript:void(0)" class="w3-button w3-red w3-margin-right" onclick="w3_open()">☰</a>
  <span>Austygen</span>
</header>

<!-- Overlay effect when opening sidebar on small screens -->
<div class="w3-overlay w3-hide-large" onclick="w3_close()" style="cursor:pointer" title="close side menu" id="myOverlay"></div>

<!-- !PAGE CONTENT! -->
<div class="w3-main" style="margin-left:340px;margin-right:40px">

  <!-- Photo grid (modal) -->
  <div class="w3-row-padding">
    <div class="w3-half">
      <img src="../resources/LoveIsSlime.jpg" style="width:100%" onclick="onClick(this)" alt="COMIC 1">
      <img src="../resources/LoveIsSlime.jpg" style="width:100%" onclick="onClick(this)" alt="COMIC 2">
      <img src="../resources/LoveIsSlime.jpg" style="width:100%" onclick="onClick(this)" alt="COMIC 3">
    </div>

    <div class="w3-half">
      <img src="../resources/LoveIsSlime.jpg" style="width:100%" onclick="onClick(this)" alt="COMIC 4">
      <img src="../resources/LoveIsSlime.jpg" style="width:100%" onclick="onClick(this)" alt="COMIC 5">
      <img src="../resources/LoveIsSlime.jpg" style="width:100%" onclick="onClick(this)" alt="COMIC 6">
    </div>
  </div>

  <!-- Modal for full size images on click-->
  <div id="modal01" class="w3-modal w3-black" style="padding-top:0" onclick="this.style.display='none'">
    <span class="w3-button w3-black w3-xxlarge w3-display-topright">×</span>
    <div class="w3-modal-content w3-animate-zoom w3-center w3-transparent w3-padding-64">
      <img id="img01" class="w3-image">
      <p id="caption"></p>
    </div>
  </div>

<!-- End page content -->
</div>

<!-- W3.CSS Container -->
<div class="w3-light-grey w3-container w3-padding-32" style="margin-top:75px;padding-right:58px"><p class="w3-right"> @Austygen 2026 </p></div>

<script src="index.js"></script> <!-- Your custom GSAP animations -->

</body>
</html>
